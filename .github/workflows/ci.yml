name: ci

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop-test:
    name: desktop-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install hxcpp
        shell: bash
        run: |
          if ! haxelib list | grep -q hxcpp; then
            haxelib install hxcpp 4.3.2 --quiet
          fi

      - name: Register local library
        shell: bash
        run: |
          haxelib dev linc_cpython .

      - name: Resolve Python build paths
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import pathlib
          import sys
          import sysconfig

          def norm(value: str) -> str:
              return pathlib.Path(value).resolve().as_posix()

          include = sysconfig.get_path("include") or sysconfig.get_path("platinclude") or ""
          libdir = sysconfig.get_config_var("LIBDIR") or ""
          ldlibrary = sysconfig.get_config_var("LDLIBRARY") or ""

          if sys.platform == "win32":
              root = pathlib.Path(sys.executable).resolve().parent
              if not include:
                  include = str(root / "include")
              if not libdir:
                  libdir = str(root / "libs")
              if not ldlibrary:
                  ldlibrary = f"python{sys.version_info.major}{sys.version_info.minor}.lib"
              if ldlibrary.lower().endswith(".lib"):
                  libname = ldlibrary[:-4]
              else:
                  libname = ldlibrary
          else:
              root = pathlib.Path(sys.executable).resolve().parent
              if not libdir:
                  libdir = str(root.parent / "lib")
              libname = ldlibrary
              if libname.startswith("lib"):
                  libname = libname[3:]
              for suffix in (".a", ".so", ".dylib"):
                  if libname.endswith(suffix):
                      libname = libname[:-len(suffix)]
                      break

          print(f"PYTHON_INCLUDE_PATH={norm(include)}")
          print(f"PYTHON_LIB_PATH={norm(libdir)}")
          print(f"PYTHON_LIB={libname}")
          print(f"PYTHON_HOME={norm(root.parent if sys.platform != 'win32' else root)}")
          PY

      - name: Show Python build paths
        shell: bash
        run: |
          echo "PYTHON_INCLUDE_PATH=$PYTHON_INCLUDE_PATH"
          echo "PYTHON_LIB_PATH=$PYTHON_LIB_PATH"
          echo "PYTHON_LIB=$PYTHON_LIB"

      - name: Build and run tests
        shell: bash
        run: |
          cd test
          haxe test.hxml \
            -D PYTHON_INCLUDE_PATH="$PYTHON_INCLUDE_PATH" \
            -D PYTHON_LIB_PATH="$PYTHON_LIB_PATH" \
            -D PYTHON_LIB="$PYTHON_LIB" \
            -D PYTHON_HOME="$PYTHON_HOME"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./cpp/Test-debug.exe
          else
            ./cpp/Test-debug
          fi

  package-haxelib:
    runs-on: ubuntu-latest
    needs: desktop-test
    steps:
      - uses: actions/checkout@v4

      - name: Create haxelib archive
        run: |
          bash scripts/package-haxelib.sh .haxelib.zip

      - name: Upload haxelib artifact
        uses: actions/upload-artifact@v4
        with:
          name: linc_cpython-haxelib
          path: .haxelib.zip

  publish-haxelib:
    runs-on: ubuntu-latest
    needs: package-haxelib
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linc_cpython-haxelib
          path: dist

      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: dist/.haxelib.zip
          tag: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
