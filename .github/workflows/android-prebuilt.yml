name: android-prebuilt

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-prebuilt.yml'
      - 'scripts/build-android-python.sh'
      - 'linc/linc_cpython.xml'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [ armv7, arm64-v8a, x86, x86_64 ]
    steps:
      - uses: actions/checkout@v4

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl pkg-config

      - name: Build CPython static library
        run: |
          bash scripts/build-android-python.sh "${{ matrix.abi }}"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}-cpython
          path: |
            lib/cpython/include/android/${{ matrix.abi }}/
            lib/cpython/lib/android/${{ matrix.abi }}/

  sync-android-prebuilts:
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: _android-artifacts

      - name: Sync prebuilt directories
        shell: bash
        run: |
          rm -rf lib/cpython/include/android lib/cpython/lib/android
          mkdir -p lib/cpython/include/android lib/cpython/lib/android
          cp -R _android-artifacts/android-armv7-cpython/lib/cpython/include/android/armv7 lib/cpython/include/android/
          cp -R _android-artifacts/android-arm64-v8a-cpython/lib/cpython/include/android/arm64-v8a lib/cpython/include/android/
          cp -R _android-artifacts/android-x86-cpython/lib/cpython/include/android/x86 lib/cpython/include/android/
          cp -R _android-artifacts/android-x86_64-cpython/lib/cpython/include/android/x86_64 lib/cpython/include/android/
          cp -R _android-artifacts/android-armv7-cpython/lib/cpython/lib/android/armv7 lib/cpython/lib/android/
          cp -R _android-artifacts/android-arm64-v8a-cpython/lib/cpython/lib/android/arm64-v8a lib/cpython/lib/android/
          cp -R _android-artifacts/android-x86-cpython/lib/cpython/lib/android/x86 lib/cpython/lib/android/
          cp -R _android-artifacts/android-x86_64-cpython/lib/cpython/lib/android/x86_64 lib/cpython/lib/android/

      - name: Commit updated prebuilts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/cpython/include/android lib/cpython/lib/android
          if ! git diff --cached --quiet; then
            git commit -m "chore: update Android CPython prebuilts"
            git push
          fi
